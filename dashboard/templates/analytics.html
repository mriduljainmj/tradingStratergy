<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORB — Analytics</title>
    <script src="https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        :root {
            --bg-base:#0B0E14; --bg-surface:#131722; --bg-card:#1E222D;
            --text-main:#D1D4DC; --text-muted:#787B86;
            --accent-blue:#2962FF; --up-green:#089981; --down-red:#F23645;
            --border-color:#2A2E39; --warning-yellow:#E6A23C;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; background:var(--bg-base); color:var(--text-main); min-height:100vh; }

        /* ── Nav ── */
        .nav { display:flex; align-items:center; gap:16px; padding:12px 24px; background:var(--bg-surface); border-bottom:1px solid var(--border-color); flex-wrap:wrap; }
        .nav .brand { font-size:16px; font-weight:800; }
        .nav a { color:var(--text-muted); font-size:13px; text-decoration:none; padding:5px 10px; border-radius:4px; border:1px solid transparent; transition:all 0.15s; }
        .nav a:hover { color:var(--text-main); border-color:var(--border-color); }
        .nav a.active { color:#fff; background:var(--accent-blue); border-color:var(--accent-blue); }

        /* ── Page ── */
        .page { max-width:1300px; margin:0 auto; padding:20px 24px; }

        /* ── Filters ── */
        .filters { display:flex; align-items:center; gap:10px; margin-bottom:20px; flex-wrap:wrap; }
        .filters label { font-size:12px; color:var(--text-muted); }
        .filters input[type=date] {
            background:var(--bg-card); border:1px solid var(--border-color); color:var(--text-main);
            padding:6px 10px; border-radius:4px; font-size:13px; outline:none;
        }
        .filters input[type=date]:focus { border-color:var(--accent-blue); }
        .btn-sm {
            padding:6px 16px; background:var(--accent-blue); color:#fff; border:none;
            border-radius:4px; font-size:12px; font-weight:700; cursor:pointer; transition:opacity 0.15s;
        }
        .btn-sm:hover { opacity:0.88; }

        /* ── Summary cards ── */
        .stat-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(170px,1fr)); gap:12px; margin-bottom:24px; }
        .stat-card { background:var(--bg-surface); border:1px solid var(--border-color); border-radius:8px; padding:16px; }
        .stat-card .lbl { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:0.06em; color:var(--text-muted); margin-bottom:6px; }
        .stat-card .val { font-size:22px; font-weight:700; }
        .stat-card .sub { font-size:11px; color:var(--text-muted); margin-top:2px; }
        .green { color:var(--up-green); }
        .red   { color:var(--down-red); }
        .blue  { color:var(--accent-blue); }

        /* ── Chart card ── */
        .chart-card { background:var(--bg-surface); border:1px solid var(--border-color); border-radius:8px; padding:16px; margin-bottom:24px; }
        .chart-card h2 { font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:0.06em; color:var(--text-muted); margin-bottom:12px; }
        #equityChart { width:100%; height:280px; }

        /* ── Tables ── */
        .section { background:var(--bg-surface); border:1px solid var(--border-color); border-radius:8px; margin-bottom:24px; overflow:hidden; }
        .section-header { display:flex; align-items:center; justify-content:space-between; padding:12px 16px; border-bottom:1px solid var(--border-color); }
        .section-header h2 { font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:0.06em; color:var(--text-muted); }
        .tbl-scroll { overflow-x:auto; }
        table { width:100%; border-collapse:collapse; font-size:13px; }
        th { padding:10px 14px; text-align:left; font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:0.05em; color:var(--text-muted); background:var(--bg-card); border-bottom:1px solid var(--border-color); white-space:nowrap; }
        td { padding:10px 14px; border-bottom:1px solid var(--border-color); white-space:nowrap; }
        tr:last-child td { border-bottom:none; }
        tr:hover td { background:rgba(255,255,255,0.02); }

        /* Pagination */
        .pagination { display:flex; align-items:center; gap:8px; padding:10px 16px; border-top:1px solid var(--border-color); }
        .pagination button { padding:4px 10px; background:var(--bg-card); border:1px solid var(--border-color); color:var(--text-muted); border-radius:4px; font-size:12px; cursor:pointer; }
        .pagination button:hover { color:var(--text-main); }
        .pagination button:disabled { opacity:0.4; cursor:not-allowed; }
        .pagination span { font-size:12px; color:var(--text-muted); }

        .empty { text-align:center; padding:40px; color:var(--text-muted); font-size:13px; }

        @media (max-width:768px) {
            .page { padding:14px; }
            .stat-grid { grid-template-columns:1fr 1fr; }
            .stat-card .val { font-size:18px; }
            #equityChart { height:220px; }
        }
    </style>
</head>
<body>
<nav class="nav">
    <span class="brand">ORB 📈</span>
    <a href="/">Dashboard</a>
    <a href="/analytics" class="active">Analytics</a>
    <a href="/strategy-builder">Strategies ⚡</a>
    <span style="margin-left:auto; font-size:12px; color:var(--text-muted)" id="userLabel"></span>
    <a href="#" onclick="logout()" style="color:var(--down-red);">Logout</a>
</nav>

<div class="page">
    <!-- Date filter -->
    <div class="filters">
        <label>From</label>
        <input type="date" id="fromDate">
        <label>To</label>
        <input type="date" id="toDate">
        <button class="btn-sm" onclick="loadAll()">Apply</button>
        <button class="btn-sm" onclick="clearDates()" style="background:var(--bg-card);border:1px solid var(--border-color);color:var(--text-muted);">Clear</button>
    </div>

    <!-- Summary cards -->
    <div class="stat-grid" id="statGrid">
        <div class="stat-card"><div class="lbl">Total P&L</div><div class="val" id="s-pnl">—</div></div>
        <div class="stat-card"><div class="lbl">Win Rate</div><div class="val" id="s-wr">—</div></div>
        <div class="stat-card"><div class="lbl">Total Trades</div><div class="val blue" id="s-tt">—</div></div>
        <div class="stat-card"><div class="lbl">Profit Factor</div><div class="val" id="s-pf">—</div></div>
        <div class="stat-card"><div class="lbl">Max Drawdown</div><div class="val red" id="s-dd">—</div></div>
        <div class="stat-card"><div class="lbl">Avg Trade</div><div class="val" id="s-avg">—</div></div>
        <div class="stat-card"><div class="lbl">Best Trade</div><div class="val green" id="s-best">—</div></div>
        <div class="stat-card"><div class="lbl">Sharpe Ratio</div><div class="val blue" id="s-sharpe">—</div></div>
    </div>

    <!-- Equity Curve -->
    <div class="chart-card">
        <h2>Equity Curve</h2>
        <div id="equityChart"></div>
    </div>

    <!-- Monthly breakdown -->
    <div class="section">
        <div class="section-header"><h2>Monthly Breakdown</h2></div>
        <div class="tbl-scroll">
            <table>
                <thead><tr><th>Month</th><th>Trades</th><th>Net P&L</th><th>Win Rate</th></tr></thead>
                <tbody id="monthlyTbody"></tbody>
            </table>
        </div>
    </div>

    <!-- Trade history -->
    <div class="section">
        <div class="section-header">
            <h2>Trade History</h2>
            <span id="tradePaginInfo" style="font-size:12px;color:var(--text-muted)"></span>
        </div>
        <div class="tbl-scroll">
            <table>
                <thead><tr><th>Date</th><th>Symbol</th><th>Type</th><th>Entry ₹</th><th>Exit ₹</th><th>Strike</th><th>Qty</th><th>Gross P&L</th><th>Charges</th><th>Net P&L</th><th>Reason</th></tr></thead>
                <tbody id="tradeTbody"></tbody>
            </table>
        </div>
        <div class="pagination">
            <button id="prevBtn" onclick="changePage(-1)">← Prev</button>
            <span id="pageInfo"></span>
            <button id="nextBtn" onclick="changePage(1)">Next →</button>
        </div>
    </div>
</div>

<script>
// ── Auth guard ──
const TOKEN = localStorage.getItem('orb_token');
if (!TOKEN) window.location.href = '/login';
const USER = JSON.parse(localStorage.getItem('orb_user') || '{}');
document.getElementById('userLabel').textContent = USER.username || '';

function logout() { localStorage.removeItem('orb_token'); localStorage.removeItem('orb_user'); window.location.href = '/login'; }
function authHeaders() { return {'Content-Type':'application/json','Authorization':'Bearer '+TOKEN}; }

// ── Equity chart ──
const equityChartEl = document.getElementById('equityChart');
const equityChart = LightweightCharts.createChart(equityChartEl, {
    layout: { textColor:'#D1D4DC', background:{type:'solid',color:'#131722'} },
    grid: { vertLines:{color:'#2A2E39'}, horzLines:{color:'#2A2E39'} },
    timeScale: { borderColor:'#2A2E39', timeVisible:true },
    rightPriceScale: { borderColor:'#2A2E39' },
    handleScale: true, handleScroll: true,
});
const areaSeries = equityChart.addAreaSeries({
    lineColor:'#2962FF', topColor:'rgba(41,98,255,0.28)', bottomColor:'rgba(41,98,255,0.02)',
    lineWidth:2,
});
new ResizeObserver(e => {
    equityChart.applyOptions({width:e[0].contentRect.width, height:e[0].contentRect.height});
}).observe(equityChartEl);

// ── Pagination state ──
let currentPage = 1; const PER_PAGE = 20;

function dateParams() {
    const f = document.getElementById('fromDate').value;
    const t = document.getElementById('toDate').value;
    let p = '';
    if (f) p += '&from='+f;
    if (t) p += '&to='+t;
    return p;
}

function clearDates() {
    document.getElementById('fromDate').value = '';
    document.getElementById('toDate').value   = '';
    loadAll();
}

async function loadAll() { currentPage = 1; await Promise.all([loadSummary(), loadEquityCurve(), loadMonthly(), loadTrades()]); }

async function loadSummary() {
    const r = await fetch('/api/analytics/summary?x=1'+dateParams(), {headers:authHeaders()});
    const d = await r.json();
    if (!d.ok) return;
    const s = d.data;
    const fmt = v => '₹'+v.toLocaleString('en-IN', {minimumFractionDigits:0, maximumFractionDigits:0});
    document.getElementById('s-pnl').innerHTML    = `<span class="${s.total_net_pnl>=0?'green':'red'}">${fmt(s.total_net_pnl)}</span>`;
    document.getElementById('s-wr').innerHTML     = `<span class="${s.win_rate>=50?'green':'red'}">${s.win_rate}%</span>`;
    document.getElementById('s-tt').textContent  = s.total_trades;
    document.getElementById('s-pf').innerHTML    = `<span class="${s.profit_factor>=1?'green':'red'}">${s.profit_factor}</span>`;
    document.getElementById('s-dd').textContent  = fmt(s.max_drawdown);
    document.getElementById('s-avg').innerHTML   = `<span class="${s.avg_trade>=0?'green':'red'}">${fmt(s.avg_trade)}</span>`;
    document.getElementById('s-best').textContent = fmt(s.best_trade);
    document.getElementById('s-sharpe').textContent = s.sharpe_ratio;
}

async function loadEquityCurve() {
    const r = await fetch('/api/analytics/equity-curve?x=1'+dateParams(), {headers:authHeaders()});
    const d = await r.json();
    if (!d.ok || !d.data.length) { areaSeries.setData([]); return; }
    areaSeries.setData(d.data.map(p => ({time: p.time, value: p.cumulative_pnl})));
    equityChart.timeScale().fitContent();
}

async function loadMonthly() {
    const r = await fetch('/api/analytics/monthly', {headers:authHeaders()});
    const d = await r.json();
    if (!d.ok) return;
    const tbody = document.getElementById('monthlyTbody');
    if (!d.data.length) { tbody.innerHTML = '<tr><td colspan="4" class="empty">No data</td></tr>'; return; }
    tbody.innerHTML = d.data.map(m => `
        <tr>
            <td>${m.month}</td>
            <td>${m.trades}</td>
            <td class="${m.net_pnl>=0?'green':'red'}">₹${m.net_pnl.toLocaleString('en-IN',{minimumFractionDigits:2})}</td>
            <td class="${m.win_rate>=50?'green':'red'}">${m.win_rate}%</td>
        </tr>`).join('');
}

async function loadTrades() {
    const r = await fetch(`/api/trades?page=${currentPage}&per_page=${PER_PAGE}&x=1${dateParams()}`, {headers:authHeaders()});
    const d = await r.json();
    if (!d.ok) return;
    const tbody = document.getElementById('tradeTbody');
    if (!d.trades.length) { tbody.innerHTML='<tr><td colspan="11" class="empty">No trades found for this period.</td></tr>'; }
    else tbody.innerHTML = d.trades.map(t => `
        <tr>
            <td>${t.date||'—'}</td>
            <td>${t.symbol||'—'}</td>
            <td style="color:${t.position_type==='CALL'?'var(--accent-blue)':'var(--down-red)'}">${t.position_type||'—'}</td>
            <td>₹${(t.entry_prem||0).toFixed(2)}</td>
            <td>₹${(t.exit_prem||0).toFixed(2)}</td>
            <td>${t.strike||'—'}</td>
            <td>${t.quantity||'—'}</td>
            <td class="${(t.gross_pnl||0)>=0?'green':'red'}">₹${(t.gross_pnl||0).toFixed(2)}</td>
            <td style="color:var(--down-red)">-₹${(t.charges||0).toFixed(2)}</td>
            <td class="${(t.net_pnl||0)>=0?'green':'red'}" style="font-weight:700">₹${(t.net_pnl||0).toFixed(2)}</td>
            <td style="color:var(--text-muted);font-size:11px">${t.exit_reason||'—'}</td>
        </tr>`).join('');

    const totalPages = Math.ceil(d.total / PER_PAGE) || 1;
    document.getElementById('pageInfo').textContent       = `Page ${currentPage} of ${totalPages}`;
    document.getElementById('tradePaginInfo').textContent = `${d.total} trades`;
    document.getElementById('prevBtn').disabled = currentPage <= 1;
    document.getElementById('nextBtn').disabled = currentPage >= totalPages;
}

function changePage(delta) { currentPage += delta; loadTrades(); }

// Set default date range: last 90 days
const today = new Date(); const ago = new Date(); ago.setDate(ago.getDate()-90);
document.getElementById('toDate').value   = today.toISOString().split('T')[0];
document.getElementById('fromDate').value = ago.toISOString().split('T')[0];

loadAll();
</script>
</body>
</html>
