<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORB — Login</title>
    <style>
        :root {
            --bg-base:#0B0E14; --bg-surface:#131722; --bg-card:#1E222D;
            --text-main:#D1D4DC; --text-muted:#787B86;
            --accent-blue:#2962FF; --up-green:#089981; --down-red:#F23645;
            --border-color:#2A2E39;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: var(--bg-base); color: var(--text-main);
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
            padding: 20px;
        }
        .card {
            background: var(--bg-surface); border: 1px solid var(--border-color);
            border-radius: 12px; padding: 36px 40px; width: 100%; max-width: 420px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.5);
        }
        .brand { margin-bottom: 28px; }
        .brand h1 { font-size: 24px; font-weight: 800; }
        .brand p  { font-size: 13px; color: var(--text-muted); margin-top: 4px; }

        /* Tab switcher */
        .tabs { display: flex; background: var(--bg-card); border-radius: 6px; padding: 3px; margin-bottom: 24px; }
        .tab {
            flex: 1; padding: 8px; text-align: center; font-size: 13px; font-weight: 600;
            cursor: pointer; border-radius: 4px; transition: all 0.15s; color: var(--text-muted);
            border: none; background: transparent;
        }
        .tab.active { background: var(--accent-blue); color: #fff; }

        .pane { display: none; }
        .pane.active { display: block; }

        label { display: block; font-size: 11px; font-weight: 700; color: var(--text-muted);
                text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 5px; }
        input[type=email], input[type=text], input[type=password] {
            width: 100%; background: var(--bg-card); border: 1px solid var(--border-color);
            color: var(--text-main); padding: 10px 12px; border-radius: 6px; font-size: 14px;
            margin-bottom: 14px; outline: none; transition: border-color 0.15s;
        }
        input:focus { border-color: var(--accent-blue); }

        .btn {
            width: 100%; padding: 11px; background: var(--accent-blue); color: #fff;
            border: none; border-radius: 6px; font-size: 14px; font-weight: 700;
            cursor: pointer; transition: opacity 0.15s; margin-top: 4px;
        }
        .btn:hover { opacity: 0.88; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .error-box {
            background: rgba(242,54,69,0.1); border: 1px solid rgba(242,54,69,0.3);
            color: var(--down-red); border-radius: 6px; padding: 9px 12px;
            font-size: 13px; margin-bottom: 14px; display: none;
        }
        .success-box {
            background: rgba(8,153,129,0.1); border: 1px solid rgba(8,153,129,0.3);
            color: var(--up-green); border-radius: 6px; padding: 9px 12px;
            font-size: 13px; margin-bottom: 14px; display: none;
        }
    </style>
</head>
<body>
<div class="card">
    <div class="brand">
        <h1>ORB 📈</h1>
        <p>Opening Range Breakout Dashboard</p>
    </div>

    <div class="tabs">
        <button class="tab active" onclick="switchTab('login')">Login</button>
        <button class="tab"        onclick="switchTab('register')">Register</button>
    </div>

    <!-- Login pane -->
    <div class="pane active" id="pane-login">
        <div class="error-box"   id="login-err"></div>
        <div class="success-box" id="login-ok"></div>
        <label for="l-email">Email</label>
        <input type="email" id="l-email" placeholder="you@example.com" autocomplete="email">
        <label for="l-pass">Password</label>
        <input type="password" id="l-pass" placeholder="••••••••" autocomplete="current-password">
        <button class="btn" id="loginBtn" onclick="doLogin()">Log In</button>
    </div>

    <!-- Register pane -->
    <div class="pane" id="pane-register">
        <div class="error-box"   id="reg-err"></div>
        <div class="success-box" id="reg-ok"></div>
        <label for="r-email">Email</label>
        <input type="email" id="r-email" placeholder="you@example.com" autocomplete="email">
        <label for="r-user">Username</label>
        <input type="text" id="r-user" placeholder="trader123" autocomplete="username">
        <label for="r-pass">Password</label>
        <input type="password" id="r-pass" placeholder="Min 8 characters" autocomplete="new-password">
        <label for="r-pass2">Confirm Password</label>
        <input type="password" id="r-pass2" placeholder="Repeat password" autocomplete="new-password">
        <button class="btn" id="regBtn" onclick="doRegister()">Create Account</button>
    </div>
</div>

<script>
function switchTab(tab) {
    document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', (i===0 && tab==='login') || (i===1 && tab==='register')));
    document.querySelectorAll('.pane').forEach(p => p.classList.remove('active'));
    document.getElementById('pane-' + tab).classList.add('active');
}

function showMsg(id, msg, isError) {
    const el = document.getElementById(id);
    el.textContent = msg;
    el.style.display = 'block';
}
function clearMsgs(prefix) {
    [prefix+'-err', prefix+'-ok'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.style.display = 'none';
    });
}

async function doLogin() {
    clearMsgs('login');
    const btn   = document.getElementById('loginBtn');
    const email = document.getElementById('l-email').value.trim();
    const pass  = document.getElementById('l-pass').value;
    if (!email || !pass) { showMsg('login-err', 'Please fill in all fields.', true); return; }

    btn.disabled = true; btn.textContent = 'Logging in…';
    try {
        const r = await fetch('/api/auth/login', {
            method: 'POST',
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify({email, password: pass}),
        });
        const d = await r.json();
        if (d.ok) {
            localStorage.setItem('orb_token', d.token);
            localStorage.setItem('orb_user',  JSON.stringify(d.user));
            // Signal dashboard to show login-success toast + risk disclosure
            sessionStorage.setItem('orb_just_logged_in', '1');
            showMsg('login-ok', '✓ Welcome back ' + d.user.username + '! Redirecting…', false);
            setTimeout(() => window.location.href = '/', 800);
        } else {
            showMsg('login-err', d.error || 'Login failed.', true);
        }
    } catch(e) { showMsg('login-err', 'Network error. Try again.', true); }
    finally { btn.disabled = false; btn.textContent = 'Log In'; }
}

async function doRegister() {
    clearMsgs('reg');
    const btn   = document.getElementById('regBtn');
    const email = document.getElementById('r-email').value.trim();
    const user  = document.getElementById('r-user').value.trim();
    const pass  = document.getElementById('r-pass').value;
    const pass2 = document.getElementById('r-pass2').value;

    if (!email || !user || !pass || !pass2) { showMsg('reg-err', 'Please fill in all fields.', true); return; }
    if (pass !== pass2) { showMsg('reg-err', 'Passwords do not match.', true); return; }
    if (pass.length < 8) { showMsg('reg-err', 'Password must be at least 8 characters.', true); return; }

    btn.disabled = true; btn.textContent = 'Creating account…';
    try {
        const r = await fetch('/api/auth/register', {
            method: 'POST',
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify({email, username: user, password: pass}),
        });
        const d = await r.json();
        if (d.ok) {
            localStorage.setItem('orb_token', d.token);
            localStorage.setItem('orb_user',  JSON.stringify(d.user));
            sessionStorage.setItem('orb_just_logged_in', '1');
            showMsg('reg-ok', '✓ Account created! Redirecting…', false);
            setTimeout(() => window.location.href = '/', 800);
        } else {
            showMsg('reg-err', d.error || 'Registration failed.', true);
        }
    } catch(e) { showMsg('reg-err', 'Network error. Try again.', true); }
    finally { btn.disabled = false; btn.textContent = 'Create Account'; }
}

// Allow Enter key to submit
document.addEventListener('keydown', e => {
    if (e.key !== 'Enter') return;
    const loginActive = document.getElementById('pane-login').classList.contains('active');
    loginActive ? doLogin() : doRegister();
});

// Redirect if already logged in
if (localStorage.getItem('orb_token')) window.location.href = '/';
</script>
</body>
</html>
