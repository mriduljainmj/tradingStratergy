<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ORB Enterprise Console</title>
    <style>
        :root {
            --bg-base: #0B0E14; --bg-surface: #131722; --bg-card: #1E222D;
            --text-main: #D1D4DC; --text-muted: #787B86;
            --accent-blue: #2962FF; --up-green: #089981; --down-red: #F23645;
            --border-color: #2A2E39; --warning-yellow: #E6A23C;
        }
        * { box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background-color: var(--bg-base);
            color: var(--text-main);
            margin: 0;
            padding: 15px 20px;
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ── Header Area ── */
        .header {
            display: flex; justify-content: space-between; align-items: center;
            padding-bottom: 12px; border-bottom: 1px solid var(--border-color);
            margin-bottom: 12px;
            flex-shrink: 0;
        }
        .header h1 { margin: 0; font-size: 22px; font-weight: 600; }
        .mode-badge { padding: 4px 10px; border-radius: 4px; font-size: 11px; font-weight: bold; margin-left: 15px; text-transform: uppercase; }
        .mode-BACKTEST { background-color: #4CAF50; color: white; }
        .mode-PAPER { background-color: var(--warning-yellow); color: #000; }
        .mode-LIVE { background-color: var(--down-red); color: white; }
        .badge { background-color: var(--bg-card); border: 1px solid var(--border-color); padding: 6px 14px; border-radius: 6px; font-size: 13px; font-weight: 600; }
        .active-call { border-color: var(--accent-blue); color: var(--accent-blue); }
        .active-put { border-color: var(--down-red); color: var(--down-red); }

        /* ── Controls Bar ── */
        .mode-switcher { display: flex; gap: 6px; align-items: center; }
        .mode-btn {
            padding: 5px 12px; border-radius: 4px; font-size: 11px; font-weight: 700;
            text-transform: uppercase; cursor: pointer; border: 1px solid var(--border-color);
            background: var(--bg-card); color: var(--text-muted); transition: all 0.15s;
        }
        .mode-btn:hover { color: var(--text-main); border-color: var(--text-muted); }
        .mode-btn.active-BACKTEST { background: #4CAF50; color: #fff; border-color: #4CAF50; }
        .mode-btn.active-PAPER    { background: var(--warning-yellow); color: #000; border-color: var(--warning-yellow); }
        .mode-btn.active-LIVE     { background: var(--down-red); color: #fff; border-color: var(--down-red); }
        .mode-btn:disabled        { opacity: 0.4; cursor: not-allowed; }

        .bt-controls {
            display: none; background: var(--bg-surface); border: 1px solid var(--border-color);
            border-radius: 6px; padding: 10px 16px; margin-bottom: 12px;
            align-items: center; gap: 20px; flex-wrap: wrap; flex-shrink: 0;
        }
        .bt-controls.visible { display: flex; }
        .bt-tab-group { display: flex; border: 1px solid var(--border-color); border-radius: 5px; overflow: hidden; }
        .bt-tab { padding: 4px 12px; font-size: 11px; font-weight: 600; cursor: pointer; background: var(--bg-card); color: var(--text-muted); border: none; }
        .bt-tab.active { background: #4CAF50; color: #fff; }
        .bt-input-group { display: flex; align-items: center; gap: 8px; }
        .bt-input-group label { font-size: 11px; color: var(--text-muted); }
        .bt-date { background: var(--bg-card); border: 1px solid var(--border-color); color: var(--text-main); padding: 4px 8px; border-radius: 4px; font-size: 12px; }
        .bt-date::-webkit-calendar-picker-indicator { filter: invert(0.6); }
        .bt-run { padding: 5px 16px; background: #4CAF50; color: #fff; border: none; border-radius: 4px; font-size: 11px; font-weight: 700; cursor: pointer; }
        .bt-run:disabled { opacity: 0.4; cursor: not-allowed; }
        .bt-status { font-size: 11px; color: var(--text-muted); margin-left: auto; }

        .range-results { display: none; background: var(--bg-surface); border: 1px solid var(--border-color); border-radius: 6px; padding: 14px; margin-bottom: 12px; flex-shrink: 0; max-height: 35vh; overflow: hidden; flex-direction: column;}
        .range-results.visible { display: flex; }
        .range-stats { display: flex; gap: 24px; flex-wrap: wrap; margin-bottom: 12px; flex-shrink: 0;}
        .range-stat { text-align: center; }
        .range-stat .rs-val { font-size: 18px; font-weight: 700; }
        .range-stat .rs-lbl { font-size: 10px; color: var(--text-muted); text-transform: uppercase; margin-top: 2px; }
        .range-scroll { overflow-y: auto; min-height: 0; flex-grow: 1; }
        .pnl-table { width: 100%; border-collapse: collapse; font-size: 11px; }
        .pnl-table th { text-align: left; padding: 4px 8px; color: var(--text-muted); border-bottom: 1px solid var(--border-color); position: sticky; top: 0; background: var(--bg-surface); z-index: 10;}
        .pnl-table td { padding: 4px 8px; border-bottom: 1px solid var(--border-color); }

        .pnl-table tr.clickable-row { cursor: pointer; transition: background 0.1s; }
        .pnl-table tr.clickable-row:hover td { background: var(--border-color); }
        .pnl-table tr.no-trade { opacity: 0.5; }

        .pnl-pos { color: var(--up-green); font-weight: 600; }
        .pnl-neg { color: var(--down-red); font-weight: 600; }

        /* ── Collapse/Minimize Buttons ── */
        .panel-header-row {
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--border-color); padding-bottom: 8px; margin-bottom: 8px;
        }
        .collapse-btn {
            background: transparent; border: none; color: var(--text-muted); font-size: 16px;
            cursor: pointer; padding: 0 4px; display: flex; align-items: center; justify-content: center;
        }
        .collapse-btn:hover { color: var(--text-main); }

        /* ── Collapsed States ── */
        .collapsed .collapsible-content { display: none !important; }
        .collapsed.card, .collapsed.range-results { flex-grow: 0 !important; min-height: fit-content !important; padding-bottom: 12px !important; }
        .collapsed.chart-wrapper, .collapsed.options-wrapper { flex-grow: 0 !important; flex-basis: auto !important; height: auto !important; min-height: fit-content !important;}
        .collapsed .panel-header-row { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
        .collapsed .chart-header { border-bottom: none; }

        /* ── Grid Layout ── */
        .grid-container { display: grid; grid-template-columns: 2.5fr 1fr; gap: 16px; flex-grow: 1; min-height: 0; }
        .charts-column { display: flex; flex-direction: column; gap: 12px; min-height: 0; }
        .chart-wrapper, .options-wrapper { background: var(--bg-surface); border: 1px solid var(--border-color); border-radius: 8px; display: flex; flex-direction: column; min-height: 0; flex: 1; overflow: hidden; transition: flex 0.2s ease;}
        .options-wrapper { display: none; }
        .options-wrapper.visible { display: flex; }
        .chart-header { padding: 8px 12px; font-size: 10px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; color: var(--text-muted); border-bottom: 1px solid var(--border-color); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
        .chart-header .ch-title { color: var(--text-main); font-size: 11px; }
        .chart-header .ch-sub   { color: var(--text-muted); font-size: 10px; }

        /* ── Fib Toggle ── */
        .fib-toggle {
            display: flex; align-items: center; gap: 4px;
            font-size: 9px; font-weight: 700; color: var(--text-muted);
            cursor: pointer; background: var(--bg-surface);
            border: 1px solid var(--border-color); border-radius: 4px;
            padding: 2px 6px; text-transform: uppercase; user-select: none;
            transition: all 0.2s;
        }
        .fib-toggle input { cursor: pointer; margin: 0; width: 10px; height: 10px; accent-color: var(--accent-blue);}
        .fib-toggle:hover { color: var(--text-main); border-color: var(--text-muted); }

        /* ── Timeframe Selector ── */
        .tf-group { display: flex; border: 1px solid var(--border-color); border-radius: 4px; overflow: hidden; }
        .tf-btn {
            padding: 2px 7px; font-size: 9px; font-weight: 700; cursor: pointer;
            background: var(--bg-card); color: var(--text-muted);
            border: none; border-right: 1px solid var(--border-color);
            text-transform: uppercase; transition: all 0.15s; user-select: none;
        }
        .tf-btn:last-child { border-right: none; }
        .tf-btn:hover { color: var(--text-main); background: var(--bg-surface); }
        .tf-btn.active { background: var(--accent-blue); color: #fff; }

        .chart-inner { flex-grow: 1; width: 100%; min-height: 0; position: relative; display: flex; flex-direction: column; }
        #chart, #optionsChart { flex-grow: 1; width: 100%; min-height: 0; position: relative; }

        /* ── Side Panel ── */
        .side-panel { display: flex; flex-direction: column; gap: 16px; min-height: 0; }
        .card { background: var(--bg-surface); border: 1px solid var(--border-color); border-radius: 8px; padding: 14px; display: flex; flex-direction: column; transition: all 0.2s ease;}

        .card.summary-card { flex-shrink: 0; }
        .card.logs-card { flex-grow: 1; min-height: 0; overflow: hidden; padding-bottom: 10px; }

        .card h3 { margin: 0; font-size: 11px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-muted); }
        .stat-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; font-size: 13px; }
        .stat-lbl { color: var(--text-muted); font-size: 12px; }
        .stat-val { font-weight: 600; font-size: 13px; }
        .divider { height: 1px; background: var(--border-color); margin: 10px 0; }
        .pnl-display { text-align: center; padding-top: 10px; }
        .pnl-display .label { font-size: 10px; font-weight: 700; text-transform: uppercase; color: var(--text-muted); margin-bottom: 4px; }
        .pnl-display .amount { font-size: 26px; font-weight: 700; }

        .tax-breakdown { padding-left: 12px; border-left: 2px solid var(--border-color); margin-bottom: 12px; margin-top: -4px; display: none; }
        .tax-breakdown.open { display: block; }
        .tax-row { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 4px; color: var(--text-muted); }
        .tax-row .val { font-family: "SF Mono", "Fira Code", monospace; }
        .clickable-row-tax { cursor: pointer; user-select: none; transition: opacity 0.15s; }
        .clickable-row-tax:hover { opacity: 0.8; }

        .log-box {
            border-radius: 6px;
            flex-grow: 1; overflow-y: auto; min-height: 0;
            font-family: "SF Mono", "Fira Code", monospace; font-size: 11px; line-height: 1.5; color: #A9B1D6;
        }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
    </style>
    <script src="https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>
</head>
<body>
    <div class="header">
        <div style="display: flex; align-items: center;">
            <h1>ORB Architecture</h1>
        </div>
        <div class="mode-switcher">
            <button class="mode-btn" id="btn-BACKTEST" onclick="switchMode('BACKTEST')">Backtest</button>
            <button class="mode-btn" id="btn-PAPER"    onclick="switchMode('PAPER')">Paper</button>
            <button class="mode-btn" id="btn-LIVE"     onclick="switchMode('LIVE')">Live</button>
        </div>
        <div class="badge" id="tradeBadge">Booting Engine...</div>
    </div>

    <div class="bt-controls" id="btControls">
        <div class="bt-tab-group">
            <button class="bt-tab active" id="tabSingle" onclick="setBtTab('single')">Single Day</button>
            <button class="bt-tab"        id="tabRange"  onclick="setBtTab('range')">Date Range</button>
        </div>

        <div class="bt-input-group" id="singleInputs">
            <label>Date</label>
            <input type="date" class="bt-date" id="btDate">
        </div>

        <div class="bt-input-group" id="rangeInputs" style="display:none;">
            <label>From</label>
            <input type="date" class="bt-date" id="btFrom">
            <label>To</label>
            <input type="date" class="bt-date" id="btTo">
        </div>

        <button class="bt-run" id="btRun" onclick="runBacktest()">Run</button>
        <span class="bt-status" id="btStatus"></span>
    </div>

    <div class="range-results" id="rangeResults">
        <div class="panel-header-row" style="margin-bottom: 0;">
            <span style="font-size:12px; font-weight:600; color:var(--text-muted); text-transform:uppercase;">Range Results</span>
            <div style="display:flex; align-items:center; gap:10px;">
                <button class="collapse-btn" onclick="togglePanel('rangeResults')">−</button>
                <button onclick="closeRangeResults()" style="background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;">✕</button>
            </div>
        </div>
        <div class="collapsible-content" style="display:flex; flex-direction:column; flex-grow:1; min-height:0; margin-top:10px;">
            <div class="range-stats" id="rangeStats"></div>
            <div class="range-scroll">
                <table class="pnl-table">
                    <thead><tr><th>Date</th><th>Position</th><th>Entry ₹</th><th>Exit ₹</th><th>Net P&L</th><th>Cumulative</th></tr></thead>
                    <tbody id="rangeTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="grid-container">
        <div class="charts-column">
            <div class="chart-wrapper" id="niftyPanel">
                <div class="chart-header">
                    <div style="display:flex; align-items:center; gap:8px;">
                        <button class="collapse-btn" onclick="togglePanel('niftyPanel')" style="margin-right:0;">−</button>
                        <span class="ch-title">NIFTY 50</span>
                        <div class="tf-group" id="niftyTfGroup">
                            <button class="tf-btn" onclick="setNiftyTf(1)">1m</button>
                            <button class="tf-btn active" onclick="setNiftyTf(5)">5m</button>
                            <button class="tf-btn" onclick="setNiftyTf(15)">15m</button>
                            <button class="tf-btn" onclick="setNiftyTf(30)">30m</button>
                            <button class="tf-btn" onclick="setNiftyTf('D')">D</button>
                        </div>
                        <label class="fib-toggle" title="Toggle Fibonacci Levels">
                            <input type="checkbox" id="fibToggle" checked onchange="toggleFibLines(this.checked)">
                            <span>FIB</span>
                        </label>
                    </div>
                    <div id="indexBadge"></div>
                </div>
                <div class="collapsible-content chart-inner">
                    <div id="chart"></div>
                </div>
            </div>

            <div class="options-wrapper" id="optionsWrapper">
                <div class="chart-header">
                    <div style="display:flex; align-items:center; gap:8px;">
                        <button class="collapse-btn" onclick="togglePanel('optionsWrapper')" style="margin-right:0;">−</button>
                        <span class="ch-title" id="optLabel">OPTIONS</span>
                        <div class="tf-group" id="optTfGroup">
                            <button class="tf-btn" onclick="setOptTf(1)">1m</button>
                            <button class="tf-btn active" onclick="setOptTf(5)">5m</button>
                            <button class="tf-btn" onclick="setOptTf(15)">15m</button>
                            <button class="tf-btn" onclick="setOptTf(30)">30m</button>
                            <button class="tf-btn" onclick="setOptTf('D')">D</button>
                        </div>
                    </div>
                    <div id="optionsBadge"></div>
                </div>
                <div class="collapsible-content chart-inner">
                    <div id="optionsChart"></div>
                </div>
            </div>
        </div>
        <div class="side-panel">

            <div class="card summary-card" id="summaryPanel">
                <div class="panel-header-row">
                    <h3>Trade Summary</h3>
                    <button class="collapse-btn" onclick="togglePanel('summaryPanel')">−</button>
                </div>
                <div class="collapsible-content">
                    <div class="stat-row"><span class="stat-lbl">OR High</span><span class="stat-val" id="orh">-</span></div>
                    <div class="stat-row"><span class="stat-lbl">OR Low</span><span class="stat-val" id="orl">-</span></div>
                    <div class="divider"></div>
                    <div class="stat-row"><span class="stat-lbl">Swing High</span><span class="stat-val" id="h">-</span></div>
                    <div class="stat-row"><span class="stat-lbl">Swing Low</span><span class="stat-val" id="l">-</span></div>
                    <div class="divider"></div>
                    <div class="stat-row"><span class="stat-lbl">Entry Prem</span><span class="stat-val" id="en">-</span></div>
                    <div class="stat-row"><span class="stat-lbl">Target</span><span class="stat-val" id="tgt" style="color:var(--up-green)">-</span></div>
                    <div class="stat-row"><span class="stat-lbl">Exit Prem</span><span class="stat-val" id="ex">-</span></div>
                    <div class="divider"></div>
                    <div class="stat-row"><span class="stat-lbl">Gross P&L</span><span class="stat-val" id="gpnl">-</span></div>

                    <div class="stat-row clickable-row-tax" onclick="document.getElementById('taxDetails').classList.toggle('open')">
                        <span class="stat-lbl" style="border-bottom: 1px dashed var(--text-muted);">Taxes & Brokerage ▾</span>
                        <span class="stat-val" id="chrg" style="color:var(--down-red)">-</span>
                    </div>

                    <div class="tax-breakdown" id="taxDetails"></div>

                    <div class="pnl-display">
                        <div class="label">Net P&amp;L</div>
                        <div class="amount" id="npnl">₹0.00</div>
                    </div>
                </div>
            </div>

            <div class="card logs-card" id="logsPanel">
                <div class="panel-header-row">
                    <h3>System Logs</h3>
                    <button class="collapse-btn" onclick="togglePanel('logsPanel')">−</button>
                </div>
                <div class="collapsible-content log-box" id="logs"></div>
            </div>

        </div>
    </div>

    <script>
        function togglePanel(panelId) {
            const panel = document.getElementById(panelId);
            const btn = panel.querySelector('.collapse-btn');

            panel.classList.toggle('collapsed');

            if (panel.classList.contains('collapsed')) {
                btn.innerText = '+';
            } else {
                btn.innerText = '−';
            }
            setTimeout(() => window.dispatchEvent(new Event('resize')), 50);
        }

        const chart = LightweightCharts.createChart(document.getElementById('chart'), {
            layout: { textColor: '#D1D4DC', background: { type: 'solid', color: '#131722' } },
            grid: { vertLines: { color: '#2A2E39' }, horzLines: { color: '#2A2E39' } },
            timeScale: {
                timeVisible: true, rightOffset: 12,
                tickMarkFormatter: (time) => new Date(time * 1000).toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit', timeZone: 'Asia/Kolkata', hour12: false })
            },
            localization: {
                timeFormatter: (time) => new Date(time * 1000).toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit', timeZone: 'Asia/Kolkata', hour12: true })
            }
        });
        const candleSeries = chart.addCandlestickSeries({ upColor: '#089981', downColor: '#F23645', borderVisible: false, wickUpColor: '#089981', wickDownColor: '#F23645' });

        const optChart = LightweightCharts.createChart(document.getElementById('optionsChart'), {
            layout: { textColor: '#D1D4DC', background: { type: 'solid', color: '#131722' } },
            grid: { vertLines: { color: '#2A2E39' }, horzLines: { color: '#2A2E39' } },
            timeScale: {
                timeVisible: true, rightOffset: 12,
                tickMarkFormatter: (time) => new Date(time * 1000).toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit', timeZone: 'Asia/Kolkata', hour12: false })
            },
            localization: {
                timeFormatter: (time) => new Date(time * 1000).toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit', timeZone: 'Asia/Kolkata', hour12: true })
            },
            crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
        });
        const optSeries = optChart.addCandlestickSeries({ upColor: '#089981', downColor: '#F23645', borderVisible: false, wickUpColor: '#089981', wickDownColor: '#F23645' });

        let optTargetLine = null;
        let optEntryLine  = null;

        new ResizeObserver(entries => {
            if (entries.length === 0 || entries[0].target !== document.getElementById('chart')) return;
            chart.applyOptions({ height: entries[0].contentRect.height, width: entries[0].contentRect.width });
        }).observe(document.getElementById('chart'));

        new ResizeObserver(entries => {
            if (entries.length === 0 || entries[0].target !== document.getElementById('optionsChart')) return;
            optChart.applyOptions({ height: entries[0].contentRect.height, width: entries[0].contentRect.width });
        }).observe(document.getElementById('optionsChart'));

        chart.subscribeCrosshairMove(param => {
            if (param.time) optChart.setCrossHairXY(optChart.timeScale().timeToCoordinate(param.time) ?? -1, 0, true);
        });

        function updateOptionsChart(state) {
            const prices = state.option_prices || [];
            const wrapper = document.getElementById('optionsWrapper');

            if (prices.length === 0) { wrapper.classList.remove('visible'); return; }

            wrapper.classList.add('visible');
            document.getElementById('optLabel').innerText = state.option_label || 'OPTIONS';

            const pos = state.position_type;
            document.getElementById('optionsBadge').innerHTML = pos === 'CALL'
                ? '<span style="color:#2962FF; font-weight:bold; font-size:10px; border:1px solid rgba(41,98,255,0.3); padding:2px 8px; border-radius:3px; background:rgba(41,98,255,0.15);">CALL</span>'
                : pos === 'PUT' ? '<span style="color:#F23645; font-weight:bold; font-size:10px; border:1px solid rgba(242,54,69,0.3); padding:2px 8px; border-radius:3px; background:rgba(242,54,69,0.15);">PUT</span>' : '';

            rawOptCandles = prices;
            optSeries.setData(aggregateCandles(rawOptCandles, optTfMins));

            const entryOpts  = { price: state.entry_prem,  color: '#787B86', lineWidth: 1, lineStyle: 2, axisLabelVisible: true, title: 'Entry'  };
            const targetOpts = { price: state.target_prem, color: '#089981', lineWidth: 1, lineStyle: 1, axisLabelVisible: true, title: 'Target' };

            if (state.entry_prem > 0) {
                if (optEntryLine)  optEntryLine.applyOptions(entryOpts);
                else optEntryLine = optSeries.createPriceLine(entryOpts);
            }
            if (state.target_prem > 0) {
                if (optTargetLine)  optTargetLine.applyOptions(targetOpts);
                else optTargetLine = optSeries.createPriceLine(targetOpts);
            }
        }

        function clearOptionsChart() {
            rawOptCandles = [];
            optSeries.setData([]);
            if (optTargetLine) { try { optSeries.removePriceLine(optTargetLine); } catch(e) {} optTargetLine = null; }
            if (optEntryLine)  { try { optSeries.removePriceLine(optEntryLine);  } catch(e) {} optEntryLine  = null; }
            document.getElementById('optionsWrapper').classList.remove('visible');
        }

        // ── Fibonacci Logic Refactor ──
        // ── Timeframe State ──
        let niftyTfMins = 5;
        let optTfMins   = 5;
        let rawNiftyCandles = [];
        let rawOptCandles   = [];

        const TF_SECS = { 1: 60, 5: 300, 15: 900, 30: 1800, D: 86400 };

        function aggregateCandles(candles, tfKey) {
            if (!candles || candles.length === 0) return [];
            const secs = TF_SECS[tfKey];
            const buckets = {};
            for (const c of candles) {
                const key = Math.floor(c.time / secs) * secs;
                if (!buckets[key]) {
                    buckets[key] = { time: key, open: c.open, high: c.high, low: c.low, close: c.close };
                } else {
                    buckets[key].high  = Math.max(buckets[key].high, c.high);
                    buckets[key].low   = Math.min(buckets[key].low,  c.low);
                    buckets[key].close = c.close;
                }
            }
            return Object.values(buckets).sort((a, b) => a.time - b.time);
        }

        function setActiveTfBtn(groupId, tfKey) {
            document.querySelectorAll(`#${groupId} .tf-btn`).forEach(btn => {
                btn.classList.toggle('active', btn.textContent === String(tfKey === 'D' ? 'D' : tfKey + 'm'));
            });
        }

        function setNiftyTf(tf) {
            niftyTfMins = tf;
            setActiveTfBtn('niftyTfGroup', tf);
            candleSeries.setData(aggregateCandles(rawNiftyCandles, tf));
            chart.timeScale().fitContent();
        }

        function setOptTf(tf) {
            optTfMins = tf;
            setActiveTfBtn('optTfGroup', tf);
            optSeries.setData(aggregateCandles(rawOptCandles, tf));
            optChart.timeScale().fitContent();
        }

        let fibLines = {};
        let lastPositionType = null;
        let frozenChart = false;
        let lastKnownState = null;
        let isFibVisible = true;

        function toggleFibLines(visible) {
            isFibVisible = visible;
            if (!isFibVisible) {
                clearFibLines();
            } else if (lastKnownState) {
                lastPositionType = null; // force redraw
                renderFibLines(lastKnownState);
            }
        }

        function clearFibLines() {
            for (const line of Object.values(fibLines)) {
                try { candleSeries.removePriceLine(line); } catch(e) {}
            }
            fibLines = {};
        }

        function buildLevels(state) {
            const h = state.current_high, l = state.current_low, r = h - l;
            const orH = state.or_high, orL = state.or_low, orR = orH - orL;

            if (state.position_type === 'CALL') {
                return {
                    'Top':   { p: h,             c: '#2962FF', t: 'Swing High (0%)',   s: 2, w: 2 },
                    'Fib23': { p: h - r * 0.236, c: '#787B86', t: 'Fib 23.6%',        s: 3, w: 1 },
                    'Fib38': { p: h - r * 0.382, c: '#787B86', t: 'Fib 38.2%',        s: 3, w: 1 },
                    'Fib50': { p: h - r * 0.500, c: '#787B86', t: 'Fib 50%',          s: 3, w: 1 },
                    'Fib61': { p: h - r * 0.618, c: '#787B86', t: 'Fib 61.8%',        s: 3, w: 1 },
                    'Trail': { p: h - r * 0.700, c: '#E6A23C', t: 'Trail SL (70%)',   s: 1, w: 1 },
                    'Fib78': { p: h - r * 0.786, c: '#787B86', t: 'Fib 78.6%',        s: 3, w: 1 },
                    'Bot':   { p: l,             c: '#F23645', t: 'Swing Low (100%)',  s: 2, w: 2 },
                };
            } else if (state.position_type === 'PUT') {
                return {
                    'Top':   { p: h,             c: '#F23645', t: 'Swing High (100%)', s: 2, w: 2 },
                    'Fib78': { p: l + r * 0.786, c: '#787B86', t: 'Fib 78.6%',        s: 3, w: 1 },
                    'Trail': { p: l + r * 0.700, c: '#E6A23C', t: 'Trail SL (70%)',   s: 1, w: 1 },
                    'Fib61': { p: l + r * 0.618, c: '#787B86', t: 'Fib 61.8%',        s: 3, w: 1 },
                    'Fib50': { p: l + r * 0.500, c: '#787B86', t: 'Fib 50%',          s: 3, w: 1 },
                    'Fib38': { p: l + r * 0.382, c: '#787B86', t: 'Fib 38.2%',        s: 3, w: 1 },
                    'Fib23': { p: l + r * 0.236, c: '#787B86', t: 'Fib 23.6%',        s: 3, w: 1 },
                    'Bot':   { p: l,             c: '#2962FF', t: 'Swing Low (0%)',    s: 2, w: 2 },
                };
            } else if (orH > 0 && orL > 0 && orL < orH) {
                return {
                    'High':  { p: orH,               c: '#2962FF', t: 'OR High',   s: 2, w: 2 },
                    'Fib61': { p: orL + orR * 0.618, c: '#787B86', t: 'Fib 61.8%', s: 3, w: 1 },
                    'Fib50': { p: orL + orR * 0.500, c: '#787B86', t: 'Fib 50%',   s: 3, w: 1 },
                    'Fib38': { p: orL + orR * 0.382, c: '#787B86', t: 'Fib 38.2%', s: 3, w: 1 },
                    'Low':   { p: orL,               c: '#F23645', t: 'OR Low',    s: 2, w: 2 },
                };
            }
            return null;
        }

        function renderFibLines(state) {
            lastKnownState = state;
            if (!isFibVisible) {
                clearFibLines();
                return;
            }

            if (state.current_high > 0 && state.current_low > 0 && state.current_low < state.current_high) {
                if (state.position_type !== lastPositionType) {
                    clearFibLines();
                    lastPositionType = state.position_type;
                }
                const levels = buildLevels(state);
                if (levels) {
                    for (const [key, cfg] of Object.entries(levels)) {
                        if (fibLines[key]) {
                            fibLines[key].applyOptions({ price: cfg.p });
                        } else {
                            fibLines[key] = candleSeries.createPriceLine({ price: cfg.p, color: cfg.c, lineWidth: cfg.w, lineStyle: cfg.s, axisLabelVisible: true, title: cfg.t });
                        }
                    }
                }
            }
        }

        function pollData() {
            fetch('/api/state')
                .then(res => res.json())
                .then(state => {
                    if (!frozenChart) {
                        rawNiftyCandles = state.candles;
                        candleSeries.setData(aggregateCandles(rawNiftyCandles, niftyTfMins));
                        candleSeries.setMarkers(state.markers);
                        renderFibLines(state);
                    }

                    if (!frozenChart) {
                        const badge = document.getElementById('tradeBadge');
                        if (state.position_type === "CALL" || state.position_type === "PUT") {
                            badge.innerText = `Active: ${state.position_type} OPTION`;
                            badge.className = `badge active-${state.position_type.toLowerCase()}`;
                        } else {
                            badge.innerText = state.status;
                            badge.className = "badge";
                        }

                        document.getElementById('indexBadge').innerHTML =
                            state.position_type === 'CALL' ? '<span style="color:#2962FF; font-weight:bold; font-size:10px; border:1px solid rgba(41,98,255,0.3); padding:2px 8px; border-radius:3px; background:rgba(41,98,255,0.15);">CALL</span>' :
                            state.position_type === 'PUT'  ? '<span style="color:#F23645; font-weight:bold; font-size:10px; border:1px solid rgba(242,54,69,0.3); padding:2px 8px; border-radius:3px; background:rgba(242,54,69,0.15);">PUT</span>'   : '';

                        document.getElementById('orh').innerText = state.or_high  > 0 ? state.or_high.toFixed(2)  : '-';
                        document.getElementById('orl').innerText = state.or_low   > 0 ? state.or_low.toFixed(2)   : '-';
                        document.getElementById('h').innerText   = state.current_high > 0 ? state.current_high.toFixed(2) : '-';
                        document.getElementById('l').innerText   = state.current_low  > 0 ? state.current_low.toFixed(2)  : '-';
                        document.getElementById('en').innerText  = state.entry_prem  > 0 ? '₹' + state.entry_prem.toFixed(2)  : '-';
                        document.getElementById('tgt').innerText = state.target_prem > 0 ? '₹' + state.target_prem.toFixed(2) : '-';
                        document.getElementById('ex').innerText  = state.exit_prem   > 0 ? '₹' + state.exit_prem.toFixed(2)   : '-';

                        document.getElementById('gpnl').innerText = state.gross_pnl !== 0 && state.gross_pnl !== undefined ? '₹' + state.gross_pnl.toFixed(2) : '-';
                        document.getElementById('chrg').innerText = state.total_charges > 0 ? '-₹' + state.total_charges.toFixed(2) : '-';

                        const pnlEl = document.getElementById('npnl');
                        pnlEl.innerText = '₹' + (state.net_pnl || 0).toFixed(2);
                        pnlEl.style.color = (state.net_pnl || 0) >= 0 ? 'var(--up-green)' : 'var(--down-red)';

                        const taxContainer = document.getElementById('taxDetails');
                        if (state.brokerage_breakdown && Object.keys(state.brokerage_breakdown).length > 0) {
                            taxContainer.innerHTML = Object.entries(state.brokerage_breakdown)
                                .map(([key, value]) => `
                                    <div class="tax-row">
                                        <span>${key}</span>
                                        <span class="val">₹${value.toFixed(2)}</span>
                                    </div>
                                `).join('');
                        } else {
                            taxContainer.innerHTML = '';
                        }

                        document.getElementById('logs').innerHTML = state.logs.map(l => `<div>${l}</div>`).join('');
                        updateOptionsChart(state);
                    }

                    ['BACKTEST', 'PAPER', 'LIVE'].forEach(m => {
                        const btn = document.getElementById('btn-' + m);
                        btn.className = 'mode-btn' + (state.app_mode === m ? ' active-' + m : '');
                    });

                    document.getElementById('btControls').classList.toggle('visible', state.app_mode === 'BACKTEST');
                });
        }

        function switchMode(mode) {
            ['BACKTEST', 'PAPER', 'LIVE'].forEach(m => document.getElementById('btn-' + m).disabled = true);
            fetch('/api/mode', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ mode })
            })
            .then(res => res.json())
            .then(() => {
                frozenChart = false;
                clearFibLines();
                clearOptionsChart();
                closeRangeResults();
            })
            .finally(() => {
                ['BACKTEST', 'PAPER', 'LIVE'].forEach(m => document.getElementById('btn-' + m).disabled = false);
            });
        }

        let btTab = 'single';
        function setBtTab(tab) {
            btTab = tab;
            document.getElementById('tabSingle').classList.toggle('active', tab === 'single');
            document.getElementById('tabRange').classList.toggle('active',  tab === 'range');
            document.getElementById('singleInputs').style.display = tab === 'single' ? 'flex' : 'none';
            document.getElementById('rangeInputs').style.display  = tab === 'range'  ? 'flex' : 'none';
            closeRangeResults();
        }

        function runBacktest() {
            const btn = document.getElementById('btRun');
            const status = document.getElementById('btStatus');
            btn.disabled = true;
            status.innerText = 'Running…';
            frozenChart = false;
            clearOptionsChart();
            closeRangeResults();

            let body;
            if (btTab === 'single') {
                const date = document.getElementById('btDate').value;
                if (!date) { status.innerText = 'Pick a date first.'; btn.disabled = false; return; }
                body = { mode: 'single', date };
            } else {
                const from_date = document.getElementById('btFrom').value;
                const to_date   = document.getElementById('btTo').value;
                if (!from_date || !to_date) { status.innerText = 'Pick both dates.'; btn.disabled = false; return; }
                body = { mode: 'range', from_date, to_date };
            }

            fetch('/api/backtest/run', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            })
            .then(res => res.json())
            .then(data => {
                if (data.error) { status.innerText = '⚠ ' + data.error; return; }
                if (btTab === 'single') {
                    displayDayResult(data);
                    status.innerText = data.trade_taken
                        ? `${data.position_type} | P&L ₹${data.pnl.toFixed(2)}`
                        : 'No trade triggered on this day.';
                } else {
                    displayRangeResult(data);
                    status.innerText = `${data.trade_days} trades | ₹${data.total_pnl.toFixed(2)} net`;
                }
            })
            .catch(() => { status.innerText = 'Request failed.'; })
            .finally(() => { btn.disabled = false; });
        }

        function loadSingleDayFromRange(dateStr) {
            const status = document.getElementById('btStatus');
            status.innerText = `Loading chart for ${dateStr}…`;

            fetch('/api/backtest/run', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ mode: 'single', date: dateStr })
            })
            .then(res => res.json())
            .then(data => {
                if (data.error) { status.innerText = '⚠ ' + data.error; return; }
                displayDayResult(data);
                status.innerText = data.trade_taken
                    ? `${data.position_type} loaded | P&L ₹${data.pnl.toFixed(2)}`
                    : `No trade triggered on ${dateStr}.`;
            })
            .catch(() => { status.innerText = 'Request failed.'; });
        }

        function displayDayResult(data) {
            frozenChart = true;
            rawNiftyCandles = data.candles || [];
            candleSeries.setData(aggregateCandles(rawNiftyCandles, niftyTfMins));
            candleSeries.setMarkers(data.markers || []);
            chart.timeScale().fitContent();

            document.getElementById('orh').innerText = data.or_high       > 0 ? data.or_high.toFixed(2)       : '-';
            document.getElementById('orl').innerText = data.or_low        > 0 ? data.or_low.toFixed(2)        : '-';
            document.getElementById('h').innerText   = data.current_high  > 0 ? data.current_high.toFixed(2)  : '-';
            document.getElementById('l').innerText   = data.current_low   > 0 ? data.current_low.toFixed(2)   : '-';
            document.getElementById('en').innerText  = data.entry_prem    > 0 ? '₹' + data.entry_prem.toFixed(2)  : '-';
            document.getElementById('tgt').innerText = data.target_prem   > 0 ? '₹' + data.target_prem.toFixed(2) : '-';
            document.getElementById('ex').innerText  = data.exit_prem     > 0 ? '₹' + data.exit_prem.toFixed(2)   : '-';

            document.getElementById('gpnl').innerText = data.gross_pnl !== 0 && data.gross_pnl !== undefined ? '₹' + data.gross_pnl.toFixed(2) : '-';
            document.getElementById('chrg').innerText = data.total_charges > 0 ? '-₹' + data.total_charges.toFixed(2) : '-';

            document.getElementById('indexBadge').innerHTML =
                data.position_type === 'CALL' ? '<span style="color:#2962FF; font-weight:bold; font-size:10px; border:1px solid rgba(41,98,255,0.3); padding:2px 8px; border-radius:3px; background:rgba(41,98,255,0.15);">CALL</span>' :
                data.position_type === 'PUT'  ? '<span style="color:#F23645; font-weight:bold; font-size:10px; border:1px solid rgba(242,54,69,0.3); padding:2px 8px; border-radius:3px; background:rgba(242,54,69,0.15);">PUT</span>'   : '';

            const pnlEl = document.getElementById('npnl');
            pnlEl.innerText   = '₹' + (data.net_pnl || 0).toFixed(2);
            pnlEl.style.color = (data.net_pnl || 0) >= 0 ? 'var(--up-green)' : 'var(--down-red)';

            const taxContainer = document.getElementById('taxDetails');
            if (data.brokerage_breakdown && Object.keys(data.brokerage_breakdown).length > 0) {
                taxContainer.innerHTML = Object.entries(data.brokerage_breakdown)
                    .map(([key, value]) => `
                        <div class="tax-row">
                            <span>${key}</span>
                            <span class="val">₹${value.toFixed(2)}</span>
                        </div>
                    `).join('');
            } else {
                taxContainer.innerHTML = '';
            }

            document.getElementById('logs').innerHTML = (data.logs || []).map(l => `<div>${l}</div>`).join('');

            clearFibLines();
            lastPositionType = null;
            const snap = { position_type: data.position_type, current_high: data.current_high, current_low: data.current_low, or_high: data.or_high, or_low: data.or_low };
            renderFibLines(snap);

            updateOptionsChart(data);
            if ((data.option_prices || []).length > 0) optChart.timeScale().fitContent();
        }

        function displayRangeResult(data) {
            const stats = [
                { val: data.total_days, lbl: 'Days Tested' },
                { val: data.trade_days, lbl: 'Trade Days' },
                { val: data.wins + ' / ' + data.losses, lbl: 'W / L' },
                { val: data.win_rate.toFixed(1) + '%', lbl: 'Win Rate' },
                { val: '₹' + data.total_pnl.toFixed(0), lbl: 'Net P&L', color: data.total_pnl >= 0 ? 'var(--up-green)' : 'var(--down-red)' },
            ];
            document.getElementById('rangeStats').innerHTML = stats.map(s =>
                `<div class="range-stat">
                    <div class="rs-val" style="color:${s.color || 'var(--text-main)'}">${s.val}</div>
                    <div class="rs-lbl">${s.lbl}</div>
                </div>`
            ).join('');

            document.getElementById('rangeTableBody').innerHTML = data.cumulative.map(row => {
                const posHtml = row.position_type === 'CALL' ? '<span style="color:#2962FF; font-weight:bold; font-size:10px; border:1px solid rgba(41,98,255,0.3); padding:2px 8px; border-radius:3px; background:rgba(41,98,255,0.15);">CALL</span>' :
                               (row.position_type === 'PUT'  ? '<span style="color:#F23645; font-weight:bold; font-size:10px; border:1px solid rgba(242,54,69,0.3); padding:2px 8px; border-radius:3px; background:rgba(242,54,69,0.15);">PUT</span>' : '-');

                const entry = row.trade_taken ? '₹' + row.entry_prem.toFixed(2) : '-';
                const exit  = row.trade_taken ? '₹' + row.exit_prem.toFixed(2) : '-';

                const rowClass = row.trade_taken ? 'clickable-row' : 'no-trade';
                const clickAttr = row.trade_taken ? `onclick="loadSingleDayFromRange('${row.date}')"` : '';
                const icon = row.trade_taken ? '<span style="float:right; font-size:12px; color:var(--accent-blue);">📊</span>' : '';

                return `<tr class="${rowClass}" ${clickAttr} title="${row.trade_taken ? 'Click to view chart' : 'No trade'}">
                    <td>${row.date} ${icon}</td>
                    <td>${posHtml}</td>
                    <td style="font-family: monospace;">${entry}</td>
                    <td style="font-family: monospace;">${exit}</td>
                    <td class="${row.pnl >= 0 ? 'pnl-pos' : 'pnl-neg'}" style="font-family: monospace;">₹${row.pnl.toFixed(2)}</td>
                    <td class="${row.cumulative >= 0 ? 'pnl-pos' : 'pnl-neg'}" style="font-family: monospace;">₹${row.cumulative.toFixed(2)}</td>
                </tr>`;
            }).join('');

            document.getElementById('rangeResults').classList.add('visible');
        }

        function closeRangeResults() {
            document.getElementById('rangeResults').classList.remove('visible');
            document.getElementById('rangeResults').classList.remove('collapsed');
            document.getElementById('rangeResults').querySelector('.collapse-btn').innerText = '−';
        }

        setInterval(pollData, 1000);
        pollData();
    </script>
</body>
</html>
